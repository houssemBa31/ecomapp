name: Flutter CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    # ubuntu-latest est parfait pour les tests et Android. 
    # (Note : macOS-latest est obligatoire si vous voulez compiler pour iOS).
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5 # Mis à jour de v4 à v5

    - name: Setup Java
      uses: actions/setup-java@v5 # Mis à jour de v4 à v5
      with:
        distribution: 'zulu'
        java-version: '17'


    # Version ultra-stable et recommandée par la communauté pour installer Flutter
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        # Optionnel : forcez une version si besoin (ex: flutter-version: '3.22.0')

    - name: Install dependencies
      run: flutter pub get

    - name: Check formatting
      run: dart format --output=none --set-exit-if-changed .

    - name: Analyze code
      run: flutter analyze

    - name: Run tests
      run: flutter test
