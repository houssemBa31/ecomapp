## 🛠️ Installation et Démarrage

  Suivez ces étapes pour exécuter le projet localement.
  
  ### Prérequis
  * Flutter SDK (Version stable la plus récente)
  * Dart SDK
  
  ### Étape 1 : Cloner le projet
  ```bash
  git clone https://github.com
  cd ecomapp
  ```
  
  ### Étape 2 : Installer les dépendances
  ```bash
  flutter pub get
  ```

### Étape 3 : Générer le code (Freezed & Retrofit)
Ce projet utilise la génération de code pour les modèles et l'API. Lancez la commande suivante pour générer les fichiers manquants:
  ```bash
  flutter pub run build_runner build --delete-conflicting-outputs
  ```
  
  ### Étape 4 : Lancer l'application
  ```bash
  flutter run
  ```

